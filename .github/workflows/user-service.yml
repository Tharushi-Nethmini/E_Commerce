name: User Service CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/user-service/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/user-service/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/user-service/package-lock.json
      
      - name: Install dependencies
        working-directory: ./backend/user-service
        run: npm ci
      
      - name: Run tests
        working-directory: ./backend/user-service
        run: npm test
        env:
          NODE_ENV: test

  security:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          command: test
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    needs: [test, security]
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend/user-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/user-service:latest
            ${{ secrets.DOCKER_USERNAME }}/user-service:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/user-service:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/user-service:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to AWS ECS
        run: |
          # Add your deployment commands here
          # Example: aws ecs update-service --cluster my-cluster --service user-service --force-new-deployment
          echo "Deployment step - configure based on your cloud provider"
